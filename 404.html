<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <style>
      /* Prevent FOIT and Raw HTML layout */
      html { background-color: #000000 !important; }
      body { 
          background-color: #000000 !important; 
          color: #e2e2e2 !important; 
          margin: 0; padding: 0; 
          visibility: visible !important; 
          opacity: 1 !important;
          display: block !important;
          font-family: sans-serif; /* Fallback to prevent layout shift */
      }
      @keyframes autoReveal { from { opacity: 0; } to { opacity: 1; } }
      .page-reveal { animation: autoReveal 0.4s ease-in-out forwards !important; }
    </style>
    <link rel="preload" href="/style.css?v=2.1.1" as="style" />
    <link rel="stylesheet" type="text/css" href="/style.css?v=2.1.1" />
    <script>
      (function(){const t=localStorage.getItem('theme')||'dark';document.documentElement.classList.add(t);})();
    </script>
    <title>404 Not Found | Random Generator Pro</title>
    <link rel="canonical" href="https://randomgeneratorpro.online/" />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta property="og:title" content="404 Not Found | Random Generator Pro" />
    <meta property="og:description" content="The page you are looking for does not exist." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://randomgeneratorpro.online/og-image.png" />
    <meta name="twitter:image" content="https://randomgeneratorpro.online/og-image.png" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="page-reveal bg-black text-white flex flex-col items-center justify-center min-h-screen font-['Geist'] text-center">
    <h1 class="text-6xl font-bold mb-4">404</h1>
    <p class="text-xl mb-8">The page you are looking for does not exist.</p>
    <a href="/" class="border border-white py-3 px-8 uppercase font-bold hover:bg-white hover:text-black transition-colors">Return to Dashboard</a>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js', { scope: '/' });
            });
        }
    </script>
</body>
</html>
